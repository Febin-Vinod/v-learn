<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Payment</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #111;
            color: #fff;
            overflow: hidden;
        }

        /* Full Page Container */
        .payment-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .payment-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(59, 89, 152, 0.1), rgba(59, 89, 152, 0.15));
            z-index: -1;
            animation: glowing 5s infinite ease-in-out;
        }

        @keyframes glowing {
            0% {
                background: rgba(59, 89, 152, 0.1);
            }
            50% {
                background: rgba(59, 89, 152, 0.25);
            }
            100% {
                background: rgba(59, 89, 152, 0.1);
            }
        }

        h1 {
            font-size: 2.5rem;
            color: #58d8e2;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .payment-details {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            display: inline-block;
        }

        .payment-details p {
            font-size: 1.2rem;
            margin: 15px 0;
            font-weight: 500;
        }

        .payment-details p strong {
            color: #58d8e2;
        }

        .pay-btn {
            font-size: 1.5rem;
            padding: 20px 50px;
            background-color: #58d8e2;
            color: #111;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .pay-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
            background-color: #43b6cc;
        }

        .pay-btn:active {
            transform: translateY(2px);
            background-color: #2c8a9b;
        }

        .icon {
            font-size: 2rem;
            color: #58d8e2;
            margin-bottom: 20px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .payment-container {
                padding: 20px;
            }

            .payment-details {
                padding: 20px;
            }

            .pay-btn {
                font-size: 1.2rem;
                padding: 15px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <i class="icon">💳</i>
        <h1>Complete Your Payment</h1>

        <div class="payment-details">
            <p><strong>Course:</strong> {{ course.title }}</p>
            <p><strong>Amount:</strong> ₹{{ course.price|floatformat:2 }}</p>
        </div>

        <button id="pay-button" class="pay-btn">Pay with Razorpay</button>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_key }}", // Razorpay Key ID
            "amount": "{{ order_amount }}", // Amount in paise
            "currency": "INR",
            "name": "{{ course.title }}",
            "description": "Payment for course",
            "handler": function (response) {
                // Send the payment ID and other details to your server to handle the payment confirmation
                var payment_id = response.razorpay_payment_id;
                var course_id = "{{ course.id }}";
                
                // Make an AJAX request to confirm the payment on the server
                fetch("{% url 'confirm_payment' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}',
                    },
                    body: JSON.stringify({
                        payment_id: payment_id,
                        course_id: course_id
                    })
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    if (data.success) {
                        window.location.href = "{% url 'payment_success' course.id %}";
                    } else {
                        alert("Payment failed: " + data.message);
                    }
                });
            },
            "prefill": {
                "name": "{{ user.first_name }} {{ user.last_name }}",
                "email": "{{ user.email }}",
                "contact": "{{ user.profile.phone }}"
            },
            "theme": {
                "color": "#58d8e2"
            }
        };

        var rzp1 = new Razorpay(options);

        document.getElementById('pay-button').onclick = function (e) {
            e.preventDefault();
            rzp1.open();
        }
    </script>
</body>
</html>
