<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <script>
        function toggleNewCategoryField() {
            const categoryField = document.getElementById('id_category');
            const newCategoryField = document.getElementById('new-category-field');

            // Check if the selected value is "others"
            if (categoryField.value === 'others') {
                newCategoryField.style.display = 'block';
            } else {
                newCategoryField.style.display = 'none';
                document.getElementById('id_new_category').value = ''; // Clear the field if hidden
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            toggleNewCategoryField(); // Initialize visibility on page load
            document.getElementById('id_category').addEventListener('change', toggleNewCategoryField);
        });
    </script>
</head>
<body>
    <h1>Add a New Course</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Render the updated course form with all fields -->
        <h2>Course Information</h2>
        {{ course_form.as_p }}

        <!-- New Category Input Field -->
        <div id="new-category-field" style="display: none;">
            <label for="id_new_category">New Category:</label>
            <input type="text" id="id_new_category" name="new_category">
        </div>

        <!-- Single Video Form Section -->
        <h2>Video Information</h2>
        <div id="video-form-container">
            <h3>Video</h3>
            {{ video_form.as_p }}
        </div>

        <!-- Submit Button -->
        <button type="submit">Add Course</button>
    </form>

    <a href="{% url 'my_courses' %}">Back to My Courses</a>
</body>
</html>
