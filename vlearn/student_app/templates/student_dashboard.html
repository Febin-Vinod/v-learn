<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #1c1c1c;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: #fff;
            letter-spacing: 1px;
            margin: 0;
        }

        .dashboard-content {
            margin: 40px auto;
            max-width: 1200px;
            padding: 0 20px;
        }

        .dashboard-section {
            background-color: #1f1f1f;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .dashboard-section h2 {
            font-size: 2rem;
            color: #00bcd4;
            margin-bottom: 15px;
        }

        .course-list, .grade-list {
            list-style-type: none;
            padding: 0;
        }

        .course-list li, .grade-list li {
            background-color: #292929;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .course-list li:hover, .grade-list li:hover {
            background-color: #333333;
        }

        .course-list li a, .grade-list li a {
            color: #00bcd4;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .course-list li a:hover, .grade-list li a:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background-color: #f44336;
            color: #fff;
            padding: 12px 25px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease;
            text-align: center;
            display: inline-block;
            margin-top: 30px;
        }

        .logout-btn:hover {
            background-color: #d32f2f;
        }

        .back-link {
            color: #00bcd4;
            font-size: 1.2rem;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #0097a7;
        }

    </style>
</head>

<body>

    <header>
        <h1>Welcome, {{ request.user.username }}</h1>
    </header>

    <div class="dashboard-content">
        <div class="dashboard-section">
            <h2>Your Courses</h2>
            <ul class="course-list">
                {% for enrollment in enrollments %}
                    <li>
                        <a href="{% url 'course_detail' enrollment.course.id %}">{{ enrollment.course.title }}</a>
                        <span>Enrolled on: {{ enrollment.date_enrolled }}</span> <!-- Optional: Display enrollment date -->
                    </li>
                {% endfor %}
            </ul>
        </div>

        <div class="dashboard-section">
            <h2>Your Grades</h2>
            <ul class="grade-list">
                <!-- Uncomment and update for grades
                {% for grade in grades %}
                    <li>{{ grade.course.name }}: {{ grade.grade }}</li>
                {% endfor %}
                -->
            </ul>
        </div>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
        

        <a href="{% url 'browse_courses' %}" class="back-link">Back to Home</a>
    </div>

</body>

</html>
