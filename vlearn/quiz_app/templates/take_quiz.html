<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz - {{ quiz.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .quiz-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .options-container {
            margin-left: 20px;
        }

        .option {
            margin-bottom: 10px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: #fff;
            border: none;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #2ecc71;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
            color: #3498db;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>{{ quiz.title }}</h1>
        <p style="text-align: center; font-size: 1.1rem; color: #777;">Quiz for the course: {{ quiz.course.title }}</p>

        <form method="post">
            {% csrf_token %}
            
            {% for question in questions %}
            <div class="question-container">
                <p class="question-text">{{ question.text }}</p>
                
                <div class="options-container">
                    {% for option in question.choices.all %}
                    <div class="option">
                        <label>
                            <input type="radio" name="question_{{ question.id }}" value="{{ option.id }}">
                            {{ option.text }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="submit-btn">Submit Quiz</button>
        </form>

        <a href="{% url 'browse_courses' %}" class="back-link">Back to Courses</a>
    </div>
</body>

</html>
