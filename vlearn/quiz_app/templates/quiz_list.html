<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz List</title>
</head>
<body>
    <h1>Quizzes for Course: {{ course.title }}</h1>

    <!-- Button to go back to create quiz page -->
    <a href="{% url 'create_quiz' course.id %}">
        <button>Create New Quiz</button>
    </a>

    <!-- Button to go back to course listing page -->
    <a href="{% url 'my_courses' %}">
        <button>Back to Courses</button>
    </a>

    <ul>
        {% for quiz in quizzes %}
            <li>
                <h2>{{ quiz.title }}</h2>
                <p><strong>Created By:</strong> {{ quiz.created_by }}</p>
                <p><strong>Description:</strong> {{ quiz.description }}</p>
                <a href="{% url 'add_question' quiz.id %}">
                    <button>Add Question</button>
                </a>

                <!-- Button to delete the quiz -->
                <form action="{% url 'delete_quiz' quiz.id %}" method="POST" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" onclick="return confirm('Are you sure you want to delete this quiz?')">Delete Quiz</button>
                </form>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
