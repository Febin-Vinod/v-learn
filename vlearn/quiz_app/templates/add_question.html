<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Questions</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f7fc;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1, h3 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 20px;
        }

        h3 {
            font-size: 1.5rem;
            margin-top: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #2980b9;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #3498db;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #2980b9;
        }

        .choice-container {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if messages %}
            <div class="alert alert-danger">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        <style>
            .alert-danger {
                background-color: #f8d7da;  /* Light red background */
                color: #721c24;  /* Dark red text */
                border-color: #f5c6cb;  /* Light red border */
            }
        </style>
        <h1>Add Questions for Quiz: {{ quiz.title }}</h1>
        <form method="POST">
            {% csrf_token %}
            {{ question_form.as_p }}

            <h3>Choices</h3>
            {% for form in choice_forms %}
                <div class="choice-container">
                    {{ form.as_p }}
                </div>
            {% endfor %}
            <button type="submit">Add Question</button>
        </form>
        <a href="{% url 'quiz_list' quiz.course.id %}" class="back-link">Back to Quiz List</a>
    </div>
