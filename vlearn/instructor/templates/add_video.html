<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Video to {{ course.title }}</title>
    <style>
        /* General Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
        }

        /* Header */
        h1 {
            text-align: center;
            color: #343a40;
            margin-top: 30px;
            font-size: 2.5rem;
            font-weight: 700;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #495057;
        }

        /* Form Container */
        form {
            max-width: 800px;
            margin: 30px auto;
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px 30px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Labels and Inputs */
        form label {
            font-weight: 600;
            color: #495057;
            display: block;
            margin-bottom: 5px;
        }

        form input, form select, form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            background: #ffffff;
            font-size: 1rem;
            color: #495057;
        }

        form input:focus, form select:focus, form textarea:focus {
            outline: none;
            border-color: #80bdff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        /* Submit Button */
        form button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        form button:hover {
            background-color: #0056b3;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Link */
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        /* Formset Section */
        .formset {
            margin-bottom: 20px;
        }

        .formset div {
            background: #f8f9fa;
            padding: 15px;
            border: 1px dashed #ced4da;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            form {
                padding: 15px 20px;
            }

            form button {
                font-size: 0.9rem;
            }

            a {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1>Add Video to Course: {{ course.title }}</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- Video Formset Fields -->
        <h2>Video Information</h2>
        {{ formset.management_form }}
        
        {% for form in formset %}
            <div class="formset">
                {{ form.as_p }}
            </div>
        {% endfor %}
        
        <button type="submit">Add Video</button>
    </form>

    <a href="{% url 'my_courses' %}">Back to My Courses</a>
</body>
</html>
