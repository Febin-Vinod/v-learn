<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1c1c1c;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            line-height: 1.6;
        }

        h1 {
            font-size: 3rem;
            color: #00ffcc;
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #141e30, #243b55);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 255, 204, 0.2);
        }

        .container h2 {
            font-size: 2.5rem;
            color: #00ffcc;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }

        .button-container {
            display: flex;
            justify-content: space-evenly;
            gap: 20px;
        }

        .button-container button {
            position: relative;
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #111;
            color: #fff;
            border: 2px solid #00ffcc;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            width: 250px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .button-container button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background-color: #00ffcc;
            opacity: 0.2;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulsate 2s infinite;
        }

        .button-container button:hover {
            background-color: #00ffcc;
            color: #111;
            transform: scale(1.05);
        }

        .button-container button:focus {
            outline: none;
        }

        @keyframes pulsate {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.2;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.3;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.2;
            }
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 1rem;
            color: #999;
        }

        .footer a {
            color: #00ffcc;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Custom style for logout button */
        .logout-btn {
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: #ff4d4d;
            color: #fff;
            border: 2px solid #ff4d4d;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            width: 250px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logout-btn:hover {
            background-color: #e60000;
            border-color: #e60000;
        }

        /* Centering the logout button */
        .logout-container {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Instructor Dashboard</h1>
        <h2>Manage Students and Instructors</h2>

        <div class="button-container">
            <button onclick="window.location.href='{% url 'student_management' %}'">Student Management</button>
            <button onclick="window.location.href='{% url 'instructor_management' %}'">Course Management</button>
        </div>

        <!-- Logout Button -->
        <div class="logout-container">
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 Instructor Dashboard. All Rights Reserved by V-le@rn</p>
        <p><a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a></p>
    </div>
</body>
</html>
