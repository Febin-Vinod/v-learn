<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-size: 1.8rem;
            color: #555;
            margin-bottom: 40px;
        }

        .button-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 40px;
        }

        .button-container button {
            padding: 15px 25px;
            font-size: 1.2rem;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            width: 250px;
        }

        .button-container button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .logout-container {
            text-align: center;
            margin-top: 30px;
        }

        .logout-btn {
            padding: 12px 20px;
            font-size: 1.1rem;
            background-color: #e60000;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 250px;
        }

        .logout-btn:hover {
            background-color: #c60000;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 1rem;
            color: #777;
        }

        .footer a {
            color: #007bff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Instructor Dashboard</h1>
        <h2>Manage Students and Courses</h2>

        <div class="button-container">

           
            <button onclick="window.location.href='{% url 'student_management' %}'">Manage Students</button>
            <button onclick="window.location.href='{% url 'my_courses' %}'">Manage Courses</button>
            <button onclick="window.location.href='{% url 'manage_chat_rooms' %}'">Manage Chat Rooms</button>
           

        </div>

        <!-- Logout Button -->
        <div class="logout-container">
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 Instructor Dashboard. All Rights Reserved by V-le@rn</p>
        <p><a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a></p>
    </div>
</body>
</html>
